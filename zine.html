<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zine - Alan Łysiak</title>
    
    <link rel="stylesheet" href="style.css?v=54.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html">Alan Łysiak</a>
        </div>
        
        <ul class="header-links">
            <li><a href="index.html">Galeria</a></li>
            <li><a href="zine.html">Zine</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
            <li>
                <a href="https://instagram.com/alan_lysiak" target="_blank" class="ig-icon" aria-label="Instagram">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
            </li>
        </ul>
    </header>

    <main style="width: 92%; max-width: 1000px; margin: 40px auto; display: flex; flex-direction: column; gap: 60px; align-items: center;">

        <a href="zine1.html" style="text-decoration: none; color: #000; text-align: center; transition: opacity 0.3s; display: block;" onmouseover="this.style.opacity='0.6'" onmouseout="this.style.opacity='1'">
            <img src="images/link_do_odkladki_zine1.jpg" alt="Okładka Zine #01" style="width: 100%; max-width: 350px; height: auto; display: block; margin: 0 auto 15px auto; cursor: pointer;">
            <span style="font-size: 1rem; letter-spacing: 4px; text-transform: uppercase;">Zine #01: Tytuł</span>
        </a>

        <div style="text-align: center; color: #ccc; pointer-events: none;">
            <div style="width: 350px; height: 450px; background-color: #fafafa; border: 1px dashed #ccc; margin: 0 auto 15px auto; display: flex; justify-content: center; align-items: center;">
                <span style="font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;">Brak okładki</span>
            </div>
            <span style="font-size: 1rem; letter-spacing: 4px; text-transform: uppercase;">Zine #02: Wkrótce</span>
        </div>

    </main>

    <footer>
        <div class="pentax-counter" title="Ilość klatek">
            <div class="counter-frame">
                <span id="frame-count">...</span>
            </div>
        </div>
        <div class="footer-name">Alan Łysiak © 2024</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const counterEl = document.getElementById('frame-count');
            try {
                fetch('https://abacus.jasoncameron.dev/hit/alan_lysiak_portfolio/pentax_v1')
                .then(r => r.json())
                .then(d => { 
                    if (counterEl) counterEl.innerText = (200 + (d.value || 0)).toString().padStart(2, '0'); 
                });
            } catch (e) { 
                if (counterEl) counterEl.innerText = "200"; 
            }
        });
    </script>
</body>
</html>
