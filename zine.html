<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zine - Alan Łysiak</title>
    
    <link rel="stylesheet" href="style.css?v=52.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&display=swap" rel="stylesheet">
    
    <style>
        .zine-index-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            gap: 30px;
            padding: 20px;
        }
        
        .zine-index-list a {
            text-decoration: none;
            color: #555;
            font-size: 1.1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        
        .zine-index-list a:hover {
            color: #000;
            transform: scale(1.05); /* Delikatne powiększenie przy najechaniu */
        }

        /* Styl dla zine'ów, które jeszcze nie wyszły */
        .zine-index-list .coming-soon {
            color: #ccc;
            pointer-events: none; /* Blokuje możliwość kliknięcia */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html">Alan Łysiak</a>
        </div>
        
        <ul class="header-links">
            <li><a href="index.html">Portfolio</a></li>
            <li><a href="zine.html">Zine</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
            <li>
                <a href="https://instagram.com/alan_lysiak" target="_blank" class="ig-icon" aria-label="Instagram">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
            </li>
        </ul>
    </header>

    <main class="zine-index-list">
        
        <a href="zine1.html">Zine #01: Flane"GR"yzm Vol.1</a>

        <a href="#" class="coming-soon">Zine #02: Wkrótce</a>
        

    </main>

    <footer>
        <div class="pentax-counter" title="Ilość klatek">
            <div class="counter-frame">
                <span id="frame-count">...</span>
            </div>
        </div>
        <div class="footer-name">Alan Łysiak </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const counterEl = document.getElementById('frame-count');
            try {
                fetch('https://abacus.jasoncameron.dev/hit/alan_lysiak_portfolio/pentax_v1')
                .then(r => r.json())
                .then(d => { 
                    if (counterEl) counterEl.innerText = (200 + (d.value || 0)).toString().padStart(2, '0'); 
                });
            } catch (e) { 
                if (counterEl) counterEl.innerText = "200"; 
            }
        });
    </script>
</body>
</html>
