<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alan Łysiak | Generator archiwum</title>
  
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

  <style>
    /* ========================================================
       1. STYLIZACJA EKRANOWA (RESPONSYWNA)
       ======================================================== */
    body { font-family: 'Courier New', Courier, monospace; background: #f4f4f4; color: #000; margin: 0; padding: 0; }
    
    header { display: flex; justify-content: space-between; align-items: center; padding: 25px 40px; background: #fff; border-bottom: 1px solid #000; flex-wrap: wrap; }
    .header-branding { display: flex; align-items: center; gap: 15px; }
    .site-logo { height: 40px; width: auto; }
    .site-name { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; text-decoration: none; color: #000; }
    
    .header-links { list-style: none; display: flex; gap: 35px; margin: 0; padding: 0; align-items: center; }
    .header-links a { text-decoration: none; color: #000; font-size: 0.8rem; text-transform: uppercase; display: flex; align-items: center; }
    .ig-icon a { color: #000; }

    .setup-panel { background: #fff; padding: 20px; border-bottom: 2px solid #000; width: 90%; max-width: 900px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .setup-panel h2 { margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-weight: bold; margin-bottom: 5px; }
    .input-group input, .input-group textarea { width: 100%; padding: 10px; font-family: inherit; border: 1px solid #ccc; box-sizing: border-box; }
    .input-group textarea { height: 120px; resize: vertical; }

    .file-upload-btn { display: inline-block; background: #000; color: #fff; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
    #file-selector { display: none; }
    #status-message { margin-top: 15px; font-weight: bold; color: #555; }

    /* ========================================================
       2. UKŁAD STRONY (RESPONSYWNY)
       ======================================================== */
    .zine-container { width: 95%; max-width: 297mm; margin: 40px auto; box-sizing: border-box; }

    .page, .zine-photo-item {
      width: 100%; 
      aspect-ratio: 297 / 210; 
      background: #fff; 
      box-sizing: border-box; 
      padding: 8%; 
      border-bottom: 1px dashed #ccc; 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between;
    }

    .contact-sheet-page {
      width: 100%;
      background: #fff;
      box-sizing: border-box;
      padding: 8%;
      border-bottom: 1px dashed #ccc;
    }

    .cover-page { justify-content: center; text-align: center; align-items: center; }
    .intro-page { justify-content: flex-start; }
    
    #render-intro-text { white-space: pre-wrap; line-height: 1.6; font-size: 14px; margin-top: 25px; }

    .img-wrapper { width: 100%; flex: 1; min-height: 0; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; overflow: hidden; }
    .img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .photo-meta { width: 100%; font-size: clamp(10px, 2vw, 13px); line-height: 1.4; border-top: 1px solid #000; padding-top: 10px; }
    .meta-bottom-row { display: flex; justify-content: space-between; margin-top: 5px; flex-wrap: wrap; }

    .contact-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
    .contact-thumb { display: flex; flex-direction: column; justify-content: space-between; align-items: center; aspect-ratio: 1; }
    .contact-thumb .thumb-wrapper { width: 100%; flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .contact-thumb img { max-width: 100%; max-height: 100%; object-fit: cover; }
    .contact-thumb .thumb-number { font-size: 9px; font-weight: bold; margin-top: 2px; }

    .print-action-btn { position: fixed; bottom: 30px; right: 30px; background: #000; color: #fff; border: none; padding: 15px 30px; font-family: inherit; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-transform: uppercase; z-index: 1000; }

    /* ========================================================
       3. NAPRAWIONY DRUK
       ======================================================== */
    @media print {
      @page { size: A4 landscape; margin: 0; }
      body { background: #fff; padding: 0; margin: 0; }
      header, .setup-panel, .print-action-btn, #status-message { display: none !important; }
      
      .zine-container { width: 297mm !important; margin: 0 !important; padding: 0 !important; }
      
      .page, .zine-photo-item, .contact-sheet-page {
        width: 297mm !important; 
        height: 210mm !important; 
        padding: 15mm !important; 
        box-sizing: border-box !important;
        border: none !important;
        margin: 0 !important;
        page-break-after: always !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: flex-start !important;
        overflow: hidden !important; /* Blokuje wyciekanie poza stronę */
      }

      .contact-grid {
        display: grid !important;
        grid-template-columns: repeat(5, 1fr) !important;
        gap: 8px !important; /* Nieco mniejszy gap, by zmieścić 25 zdjęć */
        margin-top: 10px !important;
        max-height: 160mm !important; /* Wymusza wysokość siatki */
      }

      .contact-thumb { 
        break-inside: avoid !important; /* Zapobiega łamaniu w pół */
        display: flex !important;
      }

      .page.intro-page { justify-content: flex-start !important; }
      .zine-photo-item { justify-content: space-between !important; }
      .cover-page { justify-content: center !important; align-items: center !important; }
    }
  </style>
</head>
