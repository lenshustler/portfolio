<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Łysiak | Generator archiwum</title>
    
    <!-- Link do Twojego głównego arkusza stylów, żeby wszystko wyglądało tak samo -->
    <link rel="stylesheet" href="style.css?v=46.0"> 
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <style>
        /* Nadpisanie stylu tylko dla generatora, aby tło było białe */
        body { background: #fff !important; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        
        /* Generator Content Styles */
        .setup-panel { padding: 40px; max-width: 900px; margin: 0 auto; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .input-group input, .input-group textarea { width: 100%; padding: 10px; border: 1px solid #000; box-sizing: border-box; }
        .file-upload-btn { display: inline-block; background: #000; color: #fff; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        #file-selector { display: none; }

        .zine-container { max-width: 297mm; margin: 40px auto; }
        .page, .zine-photo-item { width: 100%; aspect-ratio: 297 / 210; background: #fff; padding: 8%; border-bottom: 1px dashed #ccc; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        .contact-sheet-page { width: 100%; padding: 8%; border-bottom: 1px dashed #ccc; box-sizing: border-box; }
        .img-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; margin-bottom: 15px; }
        .img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .contact-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .contact-thumb { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; }
        .thumb-wrapper { flex: 1; display: flex; align-items: center; overflow: hidden; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .print-action-btn { position: fixed; bottom: 30px; right: 30px; background: #000; color: #fff; padding: 15px 30px; cursor: pointer; text-transform: uppercase; border: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-branding">
            <!-- Ścieżka z "Kontakt" -->
            <img src="images/logo.png" alt="Logo" class="site-logo">
            <a href="index.html" class="site-name">Alan Łysiak</a>
        </div>
        <ul class="header-links">
            <li><a href="index.html">Galeria</a></li>
            <li><a href="zine.html">Zine</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
            <li class="ig-icon">
                <a href="https://instagram.com/lenshustler" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
            </li>
        </ul>
    </header>

    <main>
        <div class="setup-panel">
            <h2>Generator archiwum</h2>
            <div class="input-group">
                <label>Tytuł Projektu:</label>
                <input type="text" id="title-input" value="GDYNIA_MAJ_2026">
            </div>
            <div class="input-group">
                <label>Autor:</label>
                <input type="text" id="author-input" value="ALAN ŁYSIAK">
            </div>
            <div class="input-group">
                <label>Tekst wstępu:</label>
                <textarea id="intro-input">Chronologiczne archiwum zdjęć.</textarea>
            </div>
            <label class="file-upload-btn">
                <input type="file" id="file-selector" multiple accept="image/jpeg, image/jpg">
                Wybierz pliki
            </label>
            <div id="status-message">Oczekiwanie na pliki...</div>
        </div>

        <div class="zine-container" id="zine-output" style="display: none;">
            <section class="page">
                <div>
                    <h1 id="render-title"></h1>
                    <div id="render-author"></div>
                    <div id="render-date"></div>
                </div>
            </section>
            <div id="photos-stage"></div>
            <div id="contact-stage"></div>
        </div>
    </main>

    <button class="print-action-btn" id="print-btn" style="display: none;" onclick="window.print()">Zapisz jako PDF</button>

    <script>
        const fileSelector = document.getElementById('file-selector');
        const statusMessage = document.getElementById('status-message');
        const zineOutput = document.getElementById('zine-output');
        const printBtn = document.getElementById('print-btn');

        fileSelector.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if(files.length === 0) return;
            statusMessage.innerText = `Przetwarzanie ${files.length} plików...`;
            let processedImages = [];
            for(let file of files) {
                processedImages.push(await extractData(file));
            }
            processedImages.sort((a, b) => new Date(a.rawDate) - new Date(b.rawDate));
            renderZine(processedImages);
        });

        function extractData(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = function() {
                    EXIF.getData(img, function() {
                        const dto = EXIF.getTag(this, "DateTimeOriginal");
                        resolve({ 
                            url: img.src, 
                            time: dto ? dto.replace(/^(\d{4}):(\d{2}):(\d{2})/, '$1-$2-$3') : "Brak daty", 
                            rawDate: dto || file.lastModified,
                            author: EXIF.getTag(this, "Artist") || document.getElementById('author-input').value 
                        });
                    });
                };
            });
        }

        function renderZine(images) {
            document.getElementById('render-title').innerText = document.getElementById('title-input').value;
            document.getElementById('render-author').innerText = document.getElementById('author-input').value;
            const stage = document.getElementById('photos-stage');
            const contactStage = document.getElementById('contact-stage');
            stage.innerHTML = ""; contactStage.innerHTML = "";

            images.forEach((img) => {
                const div = document.createElement('div');
                div.className = 'zine-photo-item';
                div.innerHTML = `<div class="img-wrapper"><img src="${img.url}"></div><div>DATA: ${img.time}</div>`;
                stage.appendChild(div);
            });
            
            zineOutput.style.display = 'block';
            printBtn.style.display = 'block';
            statusMessage.innerText = "Gotowe!";
        }
    </script>
</body>
</html>
