<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Zina | Alan Łysiak</title>
    
    <!-- Link do Twojego stylu głównego -->
    <link rel="stylesheet" href="style.css?v=45.0">
    <!-- Biblioteka EXIF -->
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <style>
        /* Styl panelu generatora dopasowany do reszty strony */
        .generator-wrapper { max-width: 800px; margin: 50px auto; padding: 20px; }
        .setup-panel { border-bottom: 1px solid #eee; padding-bottom: 40px; margin-bottom: 40px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; color: #888; }
        .input-group input, .input-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; font-family: inherit; }
        .btn-upload { background: #000; color: #fff; padding: 10px 20px; cursor: pointer; display: inline-block; text-transform: uppercase; font-size: 0.7rem; }
        #file-selector { display: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="index.html">Alan Łysiak</a></div>
        
        <!-- W generatorze wyszukiwarka może być ukryta lub zastąpiona -->
        <ul class="header-links">
            <li><a href="zine.html">Zine</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
            <li class="ig-icon">
                <a href="https://instagram.com/lenshustler" target="_blank" title="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
            </li>
        </ul>
    </header>

    <main class="generator-wrapper">
        <div class="setup-panel">
            <div class="input-group">
                <label>Tytuł:</label>
                <input type="text" id="title-input" value="NOWY PROJEKT">
            </div>
            <label class="btn-upload">
                <input type="file" id="file-selector" multiple accept="image/jpeg">
                Wybierz zdjęcia
            </label>
        </div>
        <div id="zine-output"></div>
    </main>

    <footer id="contact">
        <ul class="footer-links">
            <li><a href="zine.html">Zine</a></li>
            <li><a href="kontakt.html">Kontakt</a></li>
            <li class="ig-icon">
                <a href="https://instagram.com/lenshustler" target="_blank" title="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
            </li>
        </ul>

        <div class="pentax-counter">
            <div class="counter-frame">
                <span id="frame-count">00</span>
            </div> 
        </div>

        <p class="footer-name">&copy; Alan Łysiak</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
