<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alan Łysiak | Generator archiwum</title>
  
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
  <link rel="stylesheet" href="../style.css?v=55.0">

  <style>
    /* ========================================================
       1. STYLIZACJA EKRANOWA (Wygląd w przeglądarce)
       ======================================================== */
    body { font-family: 'Courier New', Courier, monospace; background: #f4f4f4; color: #000; margin: 0; padding: 0; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 35px 40px; background: #fff; border-bottom: 1px solid #000; }
    .header-branding { display: flex; align-items: center; gap: 15px; }
    .site-logo { height: 40px; width: auto; }
    .site-name { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; text-decoration: none; color: #000; }
    .header-links { list-style: none; display: flex; gap: 35px; margin: 0; padding: 0; }
    .header-links a { text-decoration: none; color: #000; font-size: 0.8rem; text-transform: uppercase; }

    .setup-panel { background: #fff; padding: 30px; border-bottom: 2px solid #000; max-width: 900px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-weight: bold; margin-bottom: 8px; }
    .input-group input, .input-group textarea { width: 100%; padding: 12px; font-family: inherit; border: 1px solid #ccc; box-sizing: border-box; }
    .file-upload-btn { display: inline-block; background: #000; color: #fff; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }

    /* Poprawione odstępy w podglądzie */
    .zine-container { 
        max-width: 900px; 
        margin: 40px auto; 
        padding: 40px; 
        background: #fff; 
        box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
    
    .page, .zine-photo-item, .contact-sheet-page { 
        padding: 40px; 
        margin-bottom: 30px; /* Odstęp między "stronami" w podglądzie */
        border: 1px solid #eee;
    }

    .img-wrapper { margin-bottom: 20px; text-align: center; }
    .photo-meta { padding-top: 15px; border-top: 1px solid #000; }
    
    .contact-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-top: 20px; }
    .contact-thumb { display: flex; flex-direction: column; align-items: center; gap: 10px; }

    /* ========================================================
       2. STYLIZACJA WYDRUKU (A4 Landscape)
       ======================================================== */
    @media print {
      @page { size: A4 landscape; margin: 0; }
      body { background: #fff; }
      header, .setup-panel, .print-action-btn, #status-message, footer { display: none !important; }
      
      .zine-container { 
        width: 297mm; height: 210mm; padding: 25mm; margin: 0; box-shadow: none; border: none;
      }
      .page, .zine-photo-item, .contact-sheet-page { 
        width: 297mm; height: 210mm; padding: 25mm; border: none; margin: 0;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-branding">
        <img src="../images/logo.png" alt="Logo" class="site-logo">
        <a href="../index.html" class="site-name">Alan Łysiak</a>
    </div>
    <ul class="header-links">
        <li><a href="../index.html">Galeria</a></li>
        <li><a href="../zine.html">Zine</a></li>
        <li><a href="../kontakt.html">Kontakt</a></li>
    </ul>
  </header>

  <div class="setup-panel">
    <h2>Generator archiwum</h2>
    <div class="input-group"><label>Tytuł Projektu:</label><input type="text" id="title-input" value="GDYNIA_MAJ_2026"></div>
    <div class="input-group"><label>Autor:</label><input type="text" id="author-input" value="ALAN ŁYSIAK"></div>
    <label class="file-upload-btn">
        <input type="file" id="file-selector" multiple accept="image/jpeg, image/jpg">
        Wybierz pliki i generuj
    </label>
    <div id="status-message">Oczekiwanie na pliki...</div>
  </div>

  <div class="zine-container" id="zine-output" style="display: none;">
     </div>

</body>
</html>
