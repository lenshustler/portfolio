<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alan Łysiak | Generator archiwum</title>
  
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

  <style>
    /* ========================================================
       1. STYLIZACJA EKRANOWA
       ======================================================== */
    body { font-family: 'Courier New', Courier, monospace; background: #f4f4f4; color: #000; margin: 0; padding: 0; }
    
    header { display: flex; justify-content: space-between; align-items: center; padding: 25px 40px; background: #fff; border-bottom: 1px solid #000; }
    .header-branding { display: flex; align-items: center; gap: 15px; }
    .site-logo { height: 40px; width: auto; }
    .site-name { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; text-decoration: none; color: #000; }
    .header-links { list-style: none; display: flex; gap: 35px; margin: 0; padding: 0; }
    .header-links a { text-decoration: none; color: #000; font-size: 0.8rem; text-transform: uppercase; }

    .setup-panel { background: #fff; padding: 30px; border-bottom: 2px solid #000; max-width: 900px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .setup-panel h2 { margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-weight: bold; margin-bottom: 5px; }
    .input-group input, .input-group textarea { width: 100%; padding: 10px; font-family: inherit; border: 1px solid #ccc; box-sizing: border-box; }
    .input-group textarea { height: 120px; resize: vertical; }

    .file-upload-btn { display: inline-block; background: #000; color: #fff; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
    #file-selector { display: none; }
    #status-message { margin-top: 15px; font-weight: bold; color: #555; }

    /* ========================================================
       2. UKŁAD STRONY
       ======================================================== */
    .zine-container { width: 297mm; margin: 40px auto; box-sizing: border-box; }

    .page, .zine-photo-item, .contact-sheet-page {
      width: 297mm; height: 210mm; background: #fff; box-sizing: border-box; padding: 25mm;
      border-bottom: 1px dashed #ccc; display: flex; flex-direction: column; justify-content: space-between;
      page-break-after: always; break-after: page;
    }

    .cover-page { justify-content: center; text-align: center; align-items: center; }
    .intro-page { justify-content: flex-start; }
    
    #render-intro-text { white-space: pre-wrap; line-height: 1.6; font-size: 14px; margin-top: 25px; }

    .img-wrapper { width: 100%; flex: 1; min-height: 0; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
    .img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .photo-meta { width: 100%; font-size: 13px; line-height: 1.4; border-top: 1px solid #000; padding-top: 10px; }
    .meta-bottom-row { display: flex; justify-content: space-between; margin-top: 5px; }

    .contact-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 15px; }
    .contact-thumb { display: flex; flex-direction: column; justify-content: space-between; align-items: center; height: 110px; box-sizing: border-box; }
    .contact-thumb .thumb-wrapper { width: 100%; height: 90px; display: flex; justify-content: center; align-items: center; }
    .contact-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .contact-thumb .thumb-number { font-size: 10px; font-weight: bold; margin-top: 2px; }

    .print-action-btn { position: fixed; bottom: 30px; right: 30px; background: #000; color: #fff; border: none; padding: 15px 30px; font-family: inherit; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-transform: uppercase; }

    @media print {
      @page { size: A4 landscape; margin: 0; }
      body { background: #fff; padding: 0; margin: 0; }
      header, .setup-panel, .print-action-btn, #status-message { display: none !important; }
      
      .zine-container { width: 297mm; margin: 0; padding: 0; }
      
      .page, .zine-photo-item, .contact-sheet-page {
        border: none; margin: 0; padding: 25mm; width: 297mm; height: 210mm;
        display: flex; flex-direction: column; justify-content: flex-start;
      }
      
      .page.intro-page, .contact-sheet-page {
        justify-content: flex-start !important;
      }
      
      .zine-photo-item {
        justify-content: space-between;
      }
      
      .cover-page { justify-content: center !important; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-branding">
        <img src="../images/logo.png" alt="Logo" class="site-logo">
        <a href="../index.html" class="site-name">Alan Łysiak</a>
    </div>
    <ul class="header-links">
        <li><a href="../index.html">Galeria</a></li>
        <li><a href="../zine.html">Zine</a></li>
        <li><a href="../kontakt.html">Kontakt</a></li>
        <li><a href="https://www.instagram.com/twoja_nazwa" target="_blank">Instagram</a></li>
    </ul>
  </header>

  <div class="setup-panel">
    <h2>Generator archiwum</h2>
    <p>Wgraj zdjęcia z komputera. Skrypt ułoży je chronologicznie na podstawie daty wykonania i wygeneruje proste archiwum gotowe do zapisu jako PDF.</p>
    
    <div class="input-group">
      <label for="title-input">Tytuł Projektu:</label>
      <input type="text" id="title-input" value="GDYNIA_MAJ_2026">
    </div>

    <div class="input-group">
      <label for="author-input">Autor / Fotograf:</label>
      <input type="text" id="author-input" value="ALAN ŁYSIAK">
    </div>

    <div class="input-group">
      <label for="intro-input">Tekst wstępu (O projekcie):</label>
      <textarea id="intro-input">Chronologiczne archiwum zdjęć wykonanych w maju 2026 roku w Gdyni.</textarea>
    </div>

    <label class="file-upload-btn">
      <input type="file" id="file-selector" multiple accept="image/jpeg, image/jpg">
      Wybierz pliki i generuj
    </label>

    <div id="status-message">Oczekiwanie na pliki...</div>
  </div>

  <div class="zine-container" id="zine-output" style="display: none;">
    <section class="page cover-page">
      <div>
        <h1 id="render-title">TYTUŁ</h1>
        <div id="render-author" style="font-size: 18px;">AUTORZY</div>
        <div id="render-date" style="margin-top: 35px; font-weight: bold;">DATA</div>
      </div>
    </section>

    <section class="page intro-page">
      <h2 style="text-transform: uppercase; border-bottom: 1px solid #000; padding-bottom: 10px; margin-top: 0;">O projekcie</h2>
      <div id="render-intro-text"></div>
    </section>

    <div id="photos-stage"></div>
    <div id="contact-stage"></div>
  </div>

  <button class="print-action-btn" id="print-btn" style="display: none;" onclick="window.print()">Zapisz jako PDF</button>

  <script>
    const fileSelector = document.getElementById('file-selector');
    const statusMessage = document.getElementById('status-message');
    const zineOutput = document.getElementById('zine-output');
    const printBtn = document.getElementById('print-btn');

    let processedImages = [];

    fileSelector.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if(files.length === 0) return;

      statusMessage.innerText = `Przetwarzanie i odczyt dat z ${files.length} plików...`;
      processedImages = [];

      for(let file of files) {
        try {
          const data = await extractData(file);
          processedImages.push(data);
        } catch(err) {
          console.error("Błąd pliku:", file.name, err);
        }
      }

      if(processedImages.length === 0) {
        statusMessage.innerText = "Nie udało się załadować zdjęć.";
        return;
      }

      processedImages.sort((a, b) => new Date(a.rawDate) - new Date(b.rawDate));
      renderZine(processedImages);
    });

    function extractData(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = function(event) {
          const base64Url = event.target.result;
          const img = new Image();
          img.src = base64Url;
          img.onload = function() {
            EXIF.getData(img, function() {
              const dto = EXIF.getTag(this, "DateTimeOriginal");
              let formattedTime = "Brak danych o czasie";
              let rawDate = file.lastModified;

              if(dto) {
                formattedTime = dto.replace(/^(\d{4}):(\d{2}):(\d{2})/, '$1-$2-$3');
                rawDate = formattedTime;
              }

              const artist = EXIF.getTag(this, "Artist") || EXIF.getTag(this, "Copyright");
              const defaultAuthor = document.getElementById('author-input').value;
              const author = artist || defaultAuthor;

              resolve({
                url: base64Url,
                time: formattedTime,
                rawDate: rawDate,
                author: author
              });
            });
          };
        };
        reader.readAsDataURL(file);
      });
    }

    function renderZine(images) {
      const titleVal = document.getElementById('title-input').value;
      const authorVal = document.getElementById('author-input').value;
      const introVal = document.getElementById('intro-input').value;

      document.getElementById('render-title').innerText = titleVal;
      document.getElementById('render-author').innerText = authorVal;
      document.getElementById('render-intro-text').innerText = introVal;
      
      if(images[0] && images[0].time !== "Brak danych o czasie") {
        document.getElementById('render-date').innerText = images[0].time.substring(0, 10);
      } else {
        document.getElementById('render-date').innerText = new Date().toISOString().substring(0, 10);
      }

      const total = images.length;
      const stage = document.getElementById('photos-stage');
      const contactStage = document.getElementById('contact-stage');

      stage.innerHTML = "";
      contactStage.innerHTML = "";

      images.forEach((img, index) => {
        const num = String(index + 1).padStart(2, '0');
        const totalStr = String(total).padStart(2, '0');
        const pageStatus = `${num}/${totalStr}`;

        const pageDiv = document.createElement('div');
        pageDiv.className = 'zine-photo-item';
        pageDiv.innerHTML = `
          <div class="img-wrapper">
            <img src="${img.url}">
          </div>
          <div class="photo-meta">
            <div><strong>TIME:</strong> ${img.time}</div>
            <div class="meta-bottom-row">
              <span><strong>PHOTOGRAPHER:</strong> ${img.author}</span>
              <span><strong>${titleVal}</strong> &nbsp;&nbsp; ${pageStatus}</span>
            </div>
          </div>
        `;
        stage.appendChild(pageDiv);
      });

      const itemsPerPage = 25; 
      const totalContactPages = Math.ceil(images.length / itemsPerPage);

      for (let i = 0; i < images.length; i += itemsPerPage) {
        const chunk = images.slice(i, i + itemsPerPage);
        const currentPageNum = Math.floor(i / itemsPerPage) + 1;
        
        const sheetSection = document.createElement('section');
        sheetSection.className = 'contact-sheet-page';
        
        const pageSuffix = totalContactPages > 1 ? ` — PAGE ${currentPageNum}/${totalContactPages}` : '';
        
        sheetSection.innerHTML = `
          <h2 style="margin-top: 0; border-bottom: 1px solid #000; padding-bottom: 5px; text-transform: uppercase;">
            ${titleVal} — CONTACT SHEET — ${total} FRAMES${pageSuffix}
          </h2>
          <div class="contact-grid"></div>
        `;
        
        const grid = sheetSection.querySelector('.contact-grid');
        
        chunk.forEach((img, index) => {
          const globalIndex = i + index;
          const num = String(globalIndex + 1).padStart(2, '0');
          const totalStr = String(total).padStart(2, '0');
          const pageStatus = `${num}/${totalStr}`;
          
          const thumb = document.createElement('div');
          thumb.className = 'contact-thumb';
          thumb.innerHTML = `
            <div class="thumb-wrapper">
              <img src="${img.url}">
            </div>
            <div class="thumb-number">${pageStatus}</div>
          `;
          grid.appendChild(thumb);
        });
        
        contactStage.appendChild(sheetSection);
      }

      statusMessage.innerText = `Sukces! Gotowe do zapisu. Łącznie wgrano ${total} zdjęć.`;
      zineOutput.style.display = 'block';
      printBtn.style.display = 'block';
    }
  </script>
</body>
</html>
