<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Łysiak | Generator Zine</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    
    <style>
        /* Reset i globalne style */
        body { margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; font-family: 'Courier New', monospace; background: #fff; color: #000; }
        a { text-decoration: none; color: #000; }
        ul { list-style: none; padding: 0; margin: 0; }

        /* HEADER & FOOTER - Twoja struktura */
        header, footer { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; }
        .header-branding { display: flex; align-items: center; gap: 15px; }
        .site-logo { height: 40px; width: auto; }
        .site-name { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; }
        .header-links, .footer-links { display: flex; gap: 35px; align-items: center; text-transform: uppercase; font-size: 0.8rem; }
        
        /* GENERATOR STYLES */
        main { flex: 1; padding: 40px 20px; max-width: 900px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .setup-panel { padding: 20px 0; border-bottom: 2px solid #000; margin-bottom: 40px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .input-group input, .input-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; }
        .file-upload-btn { display: inline-block; background: #000; color: #fff; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        
        /* ZINE CONTENT */
        .zine-container { max-width: 297mm; margin: 0 auto; display: none; }
        .page, .zine-photo-item, .contact-sheet-page { width: 100%; background: #fff; box-sizing: border-box; padding: 8%; border-bottom: 1px dashed #ccc; display: flex; flex-direction: column; justify-content: space-between; }
        .cover-page { aspect-ratio: 297/210; justify-content: center; text-align: center; align-items: center; }
        .img-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; margin-bottom: 15px; }
        .img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .contact-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-top: 20px; }
        .contact-thumb { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; }
        .thumb-wrapper { flex: 1; display: flex; align-items: center; overflow: hidden; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .print-action-btn { position: fixed; bottom: 30px; right: 30px; background: #000; color: #fff; border: none; padding: 15px 30px; cursor: pointer; text-transform: uppercase; z-index: 1000; }
        
        @media print {
            body { background: #fff; }
            header, footer, .setup-panel, .print-action-btn { display: none !important; }
            .zine-container { width: 297mm !important; display: block !important; }
            .page, .zine-photo-item, .contact-sheet-page { width: 297mm !important; height: 210mm !important; padding: 15mm !important; page-break-after: always !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-branding">
            <img src="images/logo.png" alt="Logo" class="site-logo">
            <a href="index.html" class="site-name">Alan Łysiak</a>
        </div>
        <ul class="header-links">
            <li><a href="index.html">Galeria</a></li>
            <li><a href="zine.html">Zine</a></li>
            <li>
                <a href="https://instagram.com/lenshustler" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                </a>
            </li>
        </ul>
    </header>

    <main>
        <div class="setup-panel">
            <h2>Generator archiwum</h2>
            <div class="input-group">
                <label>Tytuł Projektu:</label>
                <input type="text" id="title-input" value="GDYNIA_MAJ_2026">
            </div>
            <div class="input-group">
                <label>Autor:</label>
                <input type="text" id="author-input" value="ALAN ŁYSIAK">
            </div>
            <label class="file-upload-btn">
                <input type="file" id="file-selector" multiple accept="image/jpeg, image/jpg">
                Wybierz pliki
            </label>
            <div id="status-message">Wybierz pliki, aby rozpocząć...</div>
        </div>

        <div class="zine-container" id="zine-output">
            <section class="page cover-page">
                <div>
                    <h1 id="render-title"></h1>
                    <div id="render-author" style="font-size: 18px;"></div>
                    <div id="render-date" style="margin-top: 35px; font-weight: bold;"></div>
                </div>
            </section>
            <div id="photos-stage"></div>
            <div id="contact-stage"></div>
        </div>
    </main>

    <footer>
        <ul class="footer-links">
            <li><a href="index.html">Galeria</a></li>
            <li><a href="zine.html">Zine</a></li>
            <li><a href="https://instagram.com/lenshustler" target="_blank">IG</a></li>
        </ul>
        <p>&copy; Alan Łysiak</p>
    </footer>

    <button class="print-action-btn" id="print-btn" style="display: none;" onclick="window.print()">Zapisz jako PDF</button>

    <script>
        const fileSelector = document.getElementById('file-selector');
        const statusMessage = document.getElementById('status-message');
        const zineOutput = document.getElementById('zine-output');
        const printBtn = document.getElementById('print-btn');

        fileSelector.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if(files.length === 0) return;
            statusMessage.innerText = `Przetwarzanie ${files.length} plików...`;
            
            let processedImages = [];
            for(let file of files) {
                processedImages.push(await extractData(file));
            }
            processedImages.sort((a, b) => new Date(a.rawDate) - new Date(b.rawDate));
            renderZine(processedImages);
        });

        function extractData(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = function() {
                    EXIF.getData(img, function() {
                        const dto = EXIF.getTag(this, "DateTimeOriginal");
                        resolve({ 
                            url: img.src, 
                            time: dto ? dto.replace(/^(\d{4}):(\d{2}):(\d{2})/, '$1-$2-$3') : "Brak daty", 
                            rawDate: dto || file.lastModified,
                            author: EXIF.getTag(this, "Artist") || document.getElementById('author-input').value 
                        });
                    });
                };
            });
        }

        function renderZine(images) {
            const title = document.getElementById('title-input').value;
            document.getElementById('render-title').innerText = title;
            document.getElementById('render-author').innerText = document.getElementById('author-input').value;
            document.getElementById('render-date').innerText = `${images[0].time.substring(0, 10)} – ${images[images.length - 1].time.substring(0, 10)}`;
            
            const stage = document.getElementById('photos-stage');
            const contactStage = document.getElementById('contact-stage');
            stage.innerHTML = ""; contactStage.innerHTML = "";

            images.forEach((img, index) => {
                const div = document.createElement('div');
                div.className = 'zine-photo-item';
                div.innerHTML = `<div class="img-wrapper"><img src="${img.url}"></div><div>DATA: ${img.time} | FOTOGRAF: ${img.author}</div>`;
                stage.appendChild(div);
            });

            const itemsPerPage = 15;
            for (let i = 0; i < images.length; i += itemsPerPage) {
                const section = document.createElement('section');
                section.className = 'contact-sheet-page';
                section.innerHTML = `<h2>${title} — CONTACT SHEET</h2><div class="contact-grid"></div>`;
                const grid = section.querySelector('.contact-grid');
                images.slice(i, i + itemsPerPage).forEach((img, idx) => {
                    grid.innerHTML += `<div class="contact-thumb"><div class="thumb-wrapper"><img src="${img.url}"></div><small>${i + idx + 1}</small></div>`;
                });
                contactStage.appendChild(section);
            }
            zineOutput.style.display = 'block';
            printBtn.style.display = 'block';
            statusMessage.innerText = "Gotowe!";
        }
    </script>
</body>
</html>
