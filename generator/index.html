        /* Wymuszamy, aby panel generatora dobrze siedział w Twoim layoutcie */
        .generator-box {
            max-width: 800px;
            margin: 60px auto;
            padding: 20px;
        }
        .generator-controls {
            border: 1px solid #000;
            padding: 30px;
            text-align: center;
        }
        .generator-controls input {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><a href="../index.html">Alan Łysiak</a></div>
        
        <nav class="search-nav">
            <input type="text" id="search-input" class="arnold-search" placeholder="wpisz czego szukasz (np. street, portret)" autocomplete="off">
            <ul id="search-suggestions" class="suggestions-list"></ul>
        </nav>

        <ul class="header-links">
            <li><a href="../zine.html">Zine</a></li>

                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
                    </svg>
                </a>
            </li>
        </ul>
    </header>

    <main class="generator-box">
        <div class="generator-controls">
            <h2>GENERATOR ZINA</h2>
            <input type="text" id="zine-title" placeholder="Tytuł zina">
            <button onclick="document.getElementById('file-input').click()">WYBIERZ ZDJĘCIA</button>
            <input type="file" id="file-input" multiple style="display:none;">
        </div>
        <div id="zine-preview"></div>
    </main>

    <footer id="contact">
        <ul class="footer-links">
            <li><a href="../zine.html">Zine</a></li>
            <li><a href="../kontakt.html">Kontakt</a></li>
            <li class="ig-icon">
                <a href="https://instagram.com/lenshustler" target="_blank" title="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
