<style>
    /* 1. Kontener izolujący generator od reszty strony */
    .generator-container { 
        max-width: 800px; 
        margin: 40px auto; 
        padding: 20px;
        font-family: 'Tenor Sans', sans-serif; /* Wymuszenie poprawnej czcionki */
    }

    /* 2. Stylizacja elementów wewnątrz kontenera */
    .generator-container .setup-panel { border: 1px solid #000; padding: 30px; }
    .generator-container h2 { font-size: 1.2rem; margin-bottom: 20px; text-transform: uppercase; }
    .generator-container .input-group { margin-bottom: 20px; }
    .generator-container .input-group label { display: block; font-size: 0.7rem; margin-bottom: 5px; text-transform: uppercase; }
    .generator-container .input-group input, 
    .generator-container .input-group textarea { 
        width: 100%; padding: 10px; border: 1px solid #ccc; font-family: inherit; font-size: 0.9rem;
    }
    .generator-container .file-upload-btn { 
        background: #000; color: #fff; padding: 12px 20px; cursor: pointer; 
        display: inline-block; text-transform: uppercase; font-size: 0.7rem; font-weight: bold;
    }
</style>

<!-- W HTMLu zmień klasę diva z panelem na: -->
<div class="generator-container">
    <div class="setup-panel">
        <!-- reszta Twojego kodu... -->
    </div>
</div>
