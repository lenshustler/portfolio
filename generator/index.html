<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alan Łysiak | Generator archiwum</title>
  
  <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

  <style>
    /* ========================================================
       1. STYLIZACJA EKRANOWA
       ======================================================== */
    body { font-family: 'Courier New', Courier, monospace; background: #f4f4f4; color: #000; margin: 0; padding: 0; }
    
    header { display: flex; justify-content: space-between; align-items: center; padding: 25px 40px; background: #fff; border-bottom: 1px solid #000; flex-wrap: wrap; }
    .header-branding { display: flex; align-items: center; gap: 15px; }
    .site-logo { height: 40px; width: auto; }
    .site-name { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; text-decoration: none; color: #000; }
    
    .header-links { list-style: none; display: flex; gap: 35px; margin: 0; padding: 0; align-items: center; }
    .header-links a { text-decoration: none; color: #000; font-size: 0.8rem; text-transform: uppercase; display: flex; align-items: center; }
    
    .setup-panel { background: #fff; padding: 20px; border-bottom: 2px solid #000; width: 90%; max-width: 900px; margin: 20px auto; }
    .file-upload-btn { display: inline-block; background: #000; color: #fff; padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
    #file-selector { display: none; }

    /* ========================================================
       2. UKŁAD STRONY
       ======================================================== */
    .zine-container { width: 95%; max-width: 297mm; margin: 40px auto; box-sizing: border-box; }

    .page, .zine-photo-item, .contact-sheet-page {
      width: 100%; aspect-ratio: 297 / 210; background: #fff; box-sizing: border-box; padding: 8%; border-bottom: 1px dashed #ccc; display: flex; flex-direction: column;
    }

    .img-wrapper { width: 100%; flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
    .img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .contact-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
    .contact-thumb { display: flex; flex-direction: column; align-items: center; aspect-ratio: 1; }
    .contact-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .contact-thumb .thumb-number { font-size: 8px; margin-top: 2px; }

    /* ========================================================
       3. DRUKOWANIE (PRINT)
       ======================================================== */
    @media print {
      @page { size: A4 landscape; margin: 0 !important; }
      body { background: #fff; padding: 0; margin: 0; }
      header, .setup-panel, .print-action-btn, #status-message { display: none !important; }
      
      .zine-container { width: 297mm !important; margin: 0 !important; padding: 0 !important; }
      
      /* Wymuszamy identyczne marginesy dla każdej strony */
      .page, .zine-photo-item, .contact-sheet-page {
        width: 297mm !important;
        height: 210mm !important;
        padding: 15mm !important; /* Sztywny margines */
        border: none !important;
        margin: 0 !important;
        box-sizing: border-box !important;
        page-break-after: always !important;
        break-after: page !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: flex-start !important; /* Wyrównanie do góry */
      }

      .contact-grid { margin-top: 0 !important; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-branding">
        <a href="#" class="site-name">Alan Łysiak</a>
    </div>
  </header>

  <div class="setup-panel">
    <h2>Generator archiwum</h2>
    <label class="file-upload-btn">
      <input type="file" id="file-selector" multiple accept="image/jpeg">
      Wybierz pliki i generuj
    </label>
    <div id="status-message">Oczekiwanie na pliki...</div>
  </div>

  <div class="zine-container" id="zine-output" style="display: none;">
    <div id="photos-stage"></div>
    <div id="contact-stage"></div>
  </div>

  <button class="print-action-btn" id="print-btn" style="display: none; position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; cursor: pointer;" onclick="window.print()">Zapisz jako PDF</button>

  <script>
    const fileSelector = document.getElementById('file-selector');
    const zineOutput = document.getElementById('zine-output');
    const printBtn = document.getElementById('print-btn');

    fileSelector.addEventListener('change', async (e) => {
      const files = Array.from(e.target.files);
      if(files.length === 0) return;
      
      const processedImages = [];
      for(let file of files) {
        const data = await extractData(file);
        processedImages.push(data);
      }
      renderZine(processedImages);
    });

    function extractData(file) {
      return new Promise((resolve) => {
        const objectUrl = URL.createObjectURL(file);
        const img = new Image();
        img.src = objectUrl;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const maxDim = 1500;
          let w = img.width, h = img.height;
          if (w > maxDim) { h = (maxDim / w) * h; w = maxDim; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob((blob) => resolve({ url: URL.createObjectURL(blob) }), 'image/jpeg', 0.7);
        };
      });
    }

    function renderZine(images) {
      const stage = document.getElementById('photos-stage');
      const contactStage = document.getElementById('contact-stage');
      stage.innerHTML = "";
      contactStage.innerHTML = "";

      // Contact Sheet
      const itemsPerPage = 25;
      for (let i = 0; i < images.length; i += itemsPerPage) {
        const chunk = images.slice(i, i + itemsPerPage);
        const section = document.createElement('section');
        section.className = 'contact-sheet-page';
        section.innerHTML = `<h2>CONTACT SHEET</h2><div class="contact-grid"></div>`;
        const grid = section.querySelector('.contact-grid');
        chunk.forEach(img => {
          grid.innerHTML += `<div class="contact-thumb"><img src="${img.url}"></div>`;
        });
        contactStage.appendChild(section);
      }
      zineOutput.style.display = 'block';
      printBtn.style.display = 'block';
    }
  </script>
</body>
</html>
